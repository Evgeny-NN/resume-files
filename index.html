    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
            line-height: 1.6;
            background: #f8f9fa;
            color: #222;
        }

        h1 {
            color: #2c3e50;
            border-bottom: 3px solid #3498db;
            padding-bottom: 10px;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 15px;
        }

        /* --- НАВИГАЦИЯ В ШАПКЕ --- */
        .nav {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .nav a {
            color: #3498db;
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            transition: 0.2s;
        }

        .nav a:hover {
            color: #1a6e9e;
            text-decoration: underline;
        }

        .nav a:not(:last-child)::after {
            content: "|";
            color: #ccc;
            margin-left: 20px;
        }

        /* --- ОСТАЛЬНЫЕ СТИЛИ --- */
        h2 {
            color: #2c3e50;
            margin-top: 40px;
            margin-bottom: 20px;
            border-left: 5px solid #3498db;
            padding-left: 15px;
        }

        a {
            color: #3498db;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            transition: 0.2s;
        }

        .card:hover {
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.12);
        }

        .card h3 {
            margin-top: 0;
            color: #2c3e50;
        }

        .badge {
            display: inline-block;
            background: #3498db;
            color: white;
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-right: 5px;
        }

        .badge.green {
            background: #27ae60;
        }

        .badge.orange {
            background: #e67e22;
        }

        .btn-group {
            margin-top: 15px;
        }

        .btn {
            display: inline-block;
            background: #3498db;
            color: white;
            padding: 8px 18px;
            border-radius: 4px;
            margin-right: 10px;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .btn:hover {
            background: #2980b9;
            text-decoration: none;
        }

        .btn.outline {
            background: transparent;
            color: #3498db;
            border: 1px solid #3498db;
        }

        .btn.outline:hover {
            background: #3498db;
            color: white;
        }

        .footer {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            text-align: center;
            font-size: 0.9rem;
            color: #777;
        }

        .footer a {
            color: #3498db;
        }
    </style>
</head>
